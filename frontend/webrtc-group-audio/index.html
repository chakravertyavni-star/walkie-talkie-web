<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebRTC Demo</title>
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <h1>Group Audio Room</h1>
        <p>Simple real-time voice chat with shareable room codes.</p>
      </header>

      <section class="panel">
        <h2>1. Your name &amp; microphone</h2>
        <label class="field-label" for="displayNameInput">Display name</label>
        <input
          id="displayNameInput"
          type="text"
          maxlength="40"
          placeholder="e.g. Alex"
          autocomplete="nickname"
        />
        <audio id="localAudio" autoplay muted></audio>
        <button id="micButton">Start microphone</button>
      </section>

      <section class="panel">
        <h2>2. Create or Join a Group Call</h2>
        <div class="actions">
          <button id="createRoomButton" disabled>Create Room</button>
          <button id="joinRoomButton" disabled>Join Room</button>
        </div>
        <p>Share this Room ID with other users:</p>
        <input id="roomInput" placeholder="Room ID" />
      </section>

      <section class="panel">
        <h2>3. Remote Participants</h2>
        <div id="remoteAudios" class="audio-list"></div>
      </section>

      <section class="panel">
        <h2>4. Leave Call</h2>
        <button id="hangupButton" disabled>Leave Room</button>
      </section>
    </main>

    <script type="module" src="/main.js"></script>

  </body>
</html>
